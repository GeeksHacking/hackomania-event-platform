name: Deploy (API)

on:
  push:
    paths:
      - 'HackOMania.Api/**'
      - '.github/workflows/deploy-api.yml'
    branches: ["main"]
    
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  build-and-deploy:
    concurrency: deploy
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: true
      NUGET_XMLDOC_MODE: skip

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: |
            global.json
            **/*.csproj

      - name: Tests
        run: dotnet test 

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          workload_identity_provider: projects/242247218750/locations/global/workloadIdentityPools/github/providers/github
          service_account: hackomania-api-deployer@hackomania-event-portal.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: asia-southeast1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: asia-southeast1-docker.pkg.dev/hackomania-event-portal/hackomania-api/hackomania-api
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: HackOMania.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hackomania-api
          region: asia-southeast1
          image: asia-southeast1-docker.pkg.dev/hackomania-event-portal/hackomania-api/hackomania-api:latest
          no_traffic: true
          tag: candidate

      - name: Wait for health checks
        run: |
          echo "Waiting for new revision to be ready..."
          
          # Get the deployed revision name from the previous step's output
          NEW_REVISION="${{ steps.deploy.outputs.revision }}"
          
          if [ -z "$NEW_REVISION" ]; then
            echo "Error: Could not determine new revision name"
            exit 1
          fi
          
          echo "New revision: $NEW_REVISION"
          
          # Poll for revision readiness with retry logic
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            echo "Checking revision status (attempt $((ATTEMPT+1))/$MAX_ATTEMPTS)..."
            
            # Check if the Ready condition is True
            READY_STATUS=$(gcloud run revisions describe $NEW_REVISION \
              --region=asia-southeast1 \
              --format='value(status.conditions.filter(type:Ready).firstof(status))' 2>/dev/null || echo "")
            
            if [ "$READY_STATUS" = "True" ]; then
              echo "✓ Revision is ready and health checks passed!"
              break
            elif [ "$READY_STATUS" = "False" ]; then
              REASON=$(gcloud run revisions describe $NEW_REVISION \
                --region=asia-southeast1 \
                --format='value(status.conditions.filter(type:Ready).firstof(reason))' 2>/dev/null || echo "Unknown")
              MESSAGE=$(gcloud run revisions describe $NEW_REVISION \
                --region=asia-southeast1 \
                --format='value(status.conditions.filter(type:Ready).firstof(message))' 2>/dev/null || echo "")
              echo "✗ Revision failed: $REASON - $MESSAGE"
              exit 1
            else
              echo "  Status: $READY_STATUS (waiting...)"
            fi
            
            ATTEMPT=$((ATTEMPT+1))
            sleep 10
          done
          
          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "✗ Timeout waiting for revision to become ready"
            exit 1
          fi

      - name: Migrate traffic to new revision
        run: |
          echo "Migrating 100% traffic to new revision..."
          gcloud run services update-traffic hackomania-api \
            --region=asia-southeast1 \
            --to-revisions=LATEST=100

      - name: Cleanup old revisions
        if: success()
        run: |
          echo "Cleaning up old revisions (keeping last 3)..."
          gcloud run revisions list \
            --service=hackomania-api \
            --region=asia-southeast1 \
            --format='value(name)' \
            --sort-by=~metadata.creationTimestamp \
            | tail -n +4 \
            | xargs -r -I {} gcloud run revisions delete {} \
              --region=asia-southeast1 \
              --quiet || true
